name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., 0.0.1-alpha.2)"
        required: true
        default: dry-run
        type: string

permissions: {}

env:
  PYTHON_VERSION: "3.13"

jobs:
  generate-release:
    name: Generate release metadata
    runs-on: ubuntu-latest
    outputs:
      release-metadata: ${{ steps.seal-generate.outputs.metadata }}
      tag: ${{ github.event.inputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install seal
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/MatthewMckee4/seal/releases/download/0.0.1-alpha.5/seal-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Generate release metadata
        id: seal-generate
        run: |
          METADATA=$(seal generate release)
          {
            echo "metadata<<EOF"
            echo "$METADATA"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Release metadata:"
          echo "$METADATA"

  build:
    name: Build distribution
    needs: generate-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "0.9.26"
          python-version: ${{ env.PYTHON_VERSION }}

      - run: uv build

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: dist
          path: dist/

  create-release:
    name: Create GitHub release
    needs: [generate-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: dist
          path: dist

      - name: Parse release metadata
        id: parse-metadata
        env:
          METADATA: ${{ needs.generate-release.outputs.release-metadata }}
        run: |
          TITLE=$(echo "$METADATA" | jq -r '.title')
          BODY=$(echo "$METADATA" | jq -r '.body')
          PRERELEASE=$(echo "$METADATA" | jq -r '.prerelease')
          {
            echo "title=$TITLE"
            echo "prerelease=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"
          echo "$BODY" > "$RUNNER_TEMP/release-notes.txt"

      - name: Create GitHub release
        env:
          TAG: ${{ needs.generate-release.outputs.tag }}
          TITLE: ${{ steps.parse-metadata.outputs.title }}
          PRERELEASE: ${{ steps.parse-metadata.outputs.prerelease }}
        run: |
          ARGS=("$TAG" --title "$TITLE" --notes-file "$RUNNER_TEMP/release-notes.txt")
          if [ "$PRERELEASE" = "true" ]; then
            ARGS+=(--prerelease)
          fi
          ARGS+=(dist/*)
          gh release create "${ARGS[@]}"
