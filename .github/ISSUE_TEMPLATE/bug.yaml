name: Bug report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps or repo to reproduce.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: zensical-shadcn version
    validations:
      required: true
